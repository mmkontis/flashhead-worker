name: pulse
on:
  push:
    paths:
      - '.pulse-trigger'
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: ping compiled endpoint
        env:
          RPK: ${{ secrets.RUNPOD_API_KEY }}
        run: |
          curl -sf -X POST -H "Authorization: Bearer $RPK" -H "Content-Type: application/json" \
            -d '{"input":{"ping":true}}' \
            https://api.runpod.ai/v2/yl9z7g4i6ckh2j/runsync --max-time 120 | head -c 200
